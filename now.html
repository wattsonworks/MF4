<style>
:root{
  --paper:#f7efe8; --wine:#2a141d; --wine-2:#3a1c28; --ink:#231419;
  --rose:#e0467a; --rose-deep:#c13566; --blush:#f3c6d0; --gold:#d99f63;
  --card:rgba(255,255,255,.055); --card-line:rgba(255,255,255,.10);
  --serif:"Frank Ruhl Libre",Georgia,serif; --sans:"Assistant",system-ui,sans-serif; --mono:"Space Grotesk","Assistant",sans-serif;
  --ease:cubic-bezier(.22,.7,.3,1);
}
*,*::before,*::after{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:var(--sans);color:var(--paper);line-height:1.6;
  background:radial-gradient(120% 70% at 80% -10%,#3a1c28 0%,#2a141d 55%,#1d0e15 100%);
  min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
img{display:block;max-width:100%}
:focus-visible{outline:2px solid var(--blush);outline-offset:3px;border-radius:8px}
.wrap{width:min(620px,100%);margin-inline:auto;padding-inline:clamp(.9rem,4vw,1.3rem)}

/* top bar */
.bar{position:sticky;top:0;z-index:30;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(29,14,21,.72);border-bottom:1px solid var(--card-line);padding-top:env(safe-area-inset-top)}
.bar__in{display:flex;align-items:center;gap:.7rem;padding:.7rem clamp(.9rem,4vw,1.3rem)}
.bar__logo{width:34px;height:34px;border-radius:50%;object-fit:cover;flex:0 0 auto}
.bar__t{font-family:var(--serif);font-weight:700;font-size:1.12rem;line-height:1;letter-spacing:-.01em}
.bar__t small{display:block;font-family:var(--mono);font-size:.54rem;letter-spacing:.26em;text-transform:uppercase;color:var(--blush);opacity:.8;margin-top:3px}
.bar__live{margin-inline-start:auto;display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blush)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 0 rgba(224,70,122,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,70,122,.55)}70%{box-shadow:0 0 0 9px rgba(224,70,122,0)}100%{box-shadow:0 0 0 0 rgba(224,70,122,0)}}
.bar__refresh{margin-inline-start:.2rem;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:1.05rem;color:var(--blush);transition:transform .5s var(--ease)}
.bar__refresh:active{transform:rotate(180deg)}
main{padding-bottom:calc(env(safe-area-inset-bottom) + 5.5rem)}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;min-height:46px;padding:.6rem 1.15rem;border-radius:999px;
  font-family:var(--mono);font-weight:600;font-size:.85rem;transition:transform .15s var(--ease),background .25s,color .25s,border-color .25s;
  background:var(--rose);color:#fff;border:1px solid var(--rose)}
.btn:active{transform:scale(.96)}
.btn--ghost{background:transparent;color:var(--paper);border-color:var(--card-line)}
.btn--sm{min-height:40px;padding:.45rem .9rem;font-size:.8rem}

/* ── control panel: greeting + days ── */
.greet{font-family:var(--serif);font-size:1.18rem;color:var(--blush);margin:1.05rem .2rem .2rem;line-height:1.4}
.day{margin-top:1.15rem}
.day__h{display:flex;align-items:baseline;gap:.6rem;margin:0 .2rem .5rem}
.day__h h2{font-family:var(--serif);font-size:1.5rem;margin:0}
.day__d{font-family:var(--mono);font-size:.7rem;letter-spacing:.06em;color:var(--blush);opacity:.78}
.day__prog{font-family:var(--mono);font-size:.66rem;letter-spacing:.05em;color:var(--gold);margin:0 .2rem .65rem}
.ses{display:flex;align-items:center;gap:.7rem;padding:.7rem .85rem;border-radius:14px;margin-bottom:.5rem;
  background:var(--card);border:1px solid var(--card-line)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ses__time{font-family:var(--mono);font-weight:600;font-size:.92rem;color:var(--blush);min-width:3.1em;text-align:center}
.ses__main{flex:1;min-width:0}
.ses__cls{font-family:var(--serif);font-weight:500;font-size:1.08rem;line-height:1.2;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap}
.ses__who{font-size:.82rem;color:#e9d6cd;opacity:.85;margin-top:.12rem}
.ses__coming{display:flex;align-items:center;gap:.3rem;margin-top:.42rem;font-family:var(--mono);font-size:.7rem;color:var(--gold)}
.ses__coming.muted{color:rgba(243,198,208,.55)}
.ava{display:inline-grid;place-items:center;width:21px;height:21px;border-radius:50%;background:rgba(217,159,99,.32);
  font-weight:700;font-size:.62rem;color:#fff;margin-inline-start:-7px;border:1px solid var(--wine)}
.ava:first-child{margin-inline-start:0}
.ses__rsvp{flex:0 0 auto;min-height:40px;padding:.42rem .8rem;border-radius:999px;font-family:var(--mono);font-weight:600;font-size:.74rem;
  background:transparent;border:1px solid var(--card-line);color:var(--paper);transition:transform .15s var(--ease),background .25s,border-color .25s,color .25s}
.ses__rsvp:active{transform:scale(.93)}
.ses__rsvp.is-on{background:rgba(217,159,99,.2);border-color:var(--gold);color:#ffe9cf}
.badge{font-family:var(--mono);font-size:.56rem;letter-spacing:.06em;padding:.2em .55em;border-radius:999px;font-weight:600;white-space:nowrap}
.badge-now{background:var(--rose);color:#fff}
.badge-next{background:rgba(217,159,99,.22);color:var(--gold);border:1px solid rgba(217,159,99,.7)}
.badge-past{background:rgba(255,255,255,.06);color:rgba(243,198,208,.6)}
.ses--now{background:linear-gradient(150deg,rgba(224,70,122,.24),rgba(255,255,255,.04));border-color:var(--rose);box-shadow:0 12px 32px rgba(224,70,122,.2)}
.ses--now .ses__cls{font-size:1.32rem}
.ses--next{background:linear-gradient(150deg,rgba(217,159,99,.16),rgba(255,255,255,.03));border-color:rgba(217,159,99,.6)}
.ses--next .ses__cls{font-size:1.22rem}
.ses--past{opacity:.5}
.ses--past .ses__rsvp{display:none}
.ses-empty{color:rgba(243,198,208,.6);font-size:.92rem;padding:.55rem .2rem}
.ses__wx{display:inline-flex;align-items:center;gap:.3rem;margin-top:.4rem;font-family:var(--mono);font-size:.72rem;
  color:#ffe9cf;background:rgba(217,159,99,.14);border:1px solid rgba(217,159,99,.4);border-radius:999px;padding:.16em .6em}
.shabbat{margin:.2rem 0 .5rem;border-radius:16px;padding:1.1rem;text-align:center;

.shabbat b{font-family:var(--serif);font-weight:500;font-size:1.4rem;display:block;margin-bottom:.25rem}
.shabbat span{font-size:.88rem;color:var(--blush)}
.weektoggle{width:100%;margin:.5rem 0 .2rem;min-height:46px;border-radius:12px;border:1px dashed var(--card-line);background:transparent;color:var(--blush);font-family:var(--mono);font-size:.78rem}

/* admin composer */
.composer{margin:1.2rem 0 .2rem;border-radius:18px;border:1px dashed rgba(243,198,208,.4);background:rgba(255,255,255,.04);padding:.9rem}
.composer__lab{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
.composer textarea{width:100%;min-height:64px;resize:vertical;border-radius:12px;border:1px solid var(--card-line);background:rgba(0,0,0,.18);color:var(--paper);font:inherit;padding:.7rem .8rem}
.composer textarea::placeholder{color:rgba(247,239,232,.45)}
.composer__row{display:flex;align-items:center;gap:.5rem;margin-top:.6rem;flex-wrap:wrap}
.emojis{display:flex;gap:.3rem;flex-wrap:wrap}
.emojis button{font-size:1.15rem;width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid transparent}
.emojis button.sel{border-color:var(--rose);background:rgba(224,70,122,.18)}
.composer__post{margin-inline-start:auto}

/* feed */
.sec-lab{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--blush);opacity:.8;margin:1.5rem .2rem .5rem}
.moment{border-radius:18px;background:var(--card);border:1px solid var(--card-line);padding:1rem 1.05rem;margin-bottom:.85rem}
.moment__top{display:flex;align-items:center;gap:.55rem;margin-bottom:.5rem}
.moment__av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:0 0 auto}
.moment__by{font-family:var(--mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blush)}
.moment__time{margin-inline-start:auto;font-family:var(--mono);font-size:.64rem;color:rgba(243,198,208,.6)}
.moment__txt{font-size:1.06rem;line-height:1.55;color:#f6e8de}
.moment__txt .em{font-size:1.25rem;margin-inline-end:.25rem}
.moment__img{margin-top:.7rem;border-radius:12px;width:100%;max-height:340px;object-fit:cover}
.moment__del{margin-inline-start:.4rem;font-size:.72rem;color:rgba(243,198,208,.6)}
.acts{display:flex;align-items:center;gap:.45rem;margin-top:.85rem;flex-wrap:wrap}
.act{display:inline-flex;align-items:center;gap:.35rem;min-height:40px;padding:.35rem .75rem;border-radius:999px;
  border:1px solid var(--card-line);background:rgba(255,255,255,.03);font-family:var(--mono);font-size:.78rem;color:var(--paper);
  transition:transform .15s var(--ease),background .2s,border-color .2s,color .2s}
.act:active{transform:scale(.94)}
.act .ic{font-size:1rem;line-height:1}
.act.on-like{background:rgba(224,70,122,.16);border-color:var(--rose);color:#ffd9e6}
.act.on-coming{background:rgba(217,159,99,.18);border-color:var(--gold);color:#ffe9cf}
.act .n{opacity:.85;font-size:.74rem}
.coming-names{font-family:var(--mono);font-size:.7rem;color:var(--gold);margin-top:.55rem}
.cmts{margin-top:.7rem;border-top:1px solid var(--card-line);padding-top:.6rem;display:none}
.cmts.open{display:block}
.cmt{font-size:.9rem;margin:.3rem 0;line-height:1.45}
.cmt b{color:var(--blush);font-weight:700;font-size:.8rem}
.cmt__t{font-family:var(--mono);font-size:.58rem;color:rgba(243,198,208,.5);margin-inline-start:.35rem}
.cmt-form{display:flex;gap:.45rem;margin-top:.55rem}
.cmt-form input{flex:1;min-height:42px;border-radius:999px;border:1px solid var(--card-line);background:rgba(0,0,0,.18);color:var(--paper);font:inherit;padding:.5rem .9rem}
.cmt-form input::placeholder{color:rgba(247,239,232,.4)}
.empty{text-align:center;color:rgba(243,198,208,.65);font-size:.95rem;padding:1.6rem 1rem;line-height:1.7}
.foot{text-align:center;padding:1.5rem 1rem 0;font-family:var(--mono);font-size:.68rem;letter-spacing:.1em;color:rgba(243,198,208,.55)}
.foot a{color:var(--blush);border-bottom:1px solid rgba(243,198,208,.3)}

.install{position:fixed;inset-block-end:calc(env(safe-area-inset-bottom) + 1rem);inset-inline:0;margin-inline:auto;width:max-content;z-index:40;
  background:var(--gold);color:#3a1c28;box-shadow:0 12px 30px rgba(0,0,0,.4);font-weight:700}
.toast{position:fixed;inset-block-end:calc(env(safe-area-inset-bottom) + 5.2rem);inset-inline:0;margin-inline:auto;width:max-content;max-width:88vw;z-index:50;
  background:#fff;color:var(--ink);font-weight:600;font-size:.88rem;padding:.7rem 1.1rem;border-radius:999px;box-shadow:0 12px 30px rgba(0,0,0,.35);
  opacity:0;transform:translateY(12px);transition:opacity .3s,transform .3s;pointer-events:none}
.toast.show{opacity:1;transform:none}
.modal{position:fixed;inset:0;z-index:60;display:none;place-items:center;background:rgba(15,7,11,.7);backdrop-filter:blur(6px);padding:1.2rem}
.modal.open{display:grid}
.modal__card{width:min(360px,100%);background:var(--wine-2);border:1px solid var(--card-line);border-radius:20px;padding:1.4rem}
.modal__card h3{font-family:var(--serif);margin:0 0 .3rem;font-size:1.3rem}
.modal__card p{margin:0 0 .9rem;font-size:.9rem;color:var(--blush)}
.modal__card input{width:100%;min-height:48px;border-radius:12px;border:1px solid var(--card-line);background:rgba(0,0,0,.2);color:var(--paper);font:inherit;padding:.6rem .9rem;margin-bottom:.9rem}
.modal__row{display:flex;gap:.6rem}
.skel{height:90px;border-radius:14px;background:linear-gradient(100deg,rgba(255,255,255,.04),rgba(255,255,255,.09),rgba(255,255,255,.04));background-size:200% 100%;animation:sh 1.3s infinite;margin-bottom:.55rem}
@keyframes sh{to{background-position:-200% 0}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

  ];
  var B = [
    [["08:30","עיצוב וחיטוב","מיכל רייכר"],["17:30","פילאטיס","מיכל רייכר"],["18:30","קיקבוקס שורף · ישבן בטן","מיכל רייכר"],["19:30","אימון כח משולב HIIT","מיכל רייכר"]],
    [["05:30","עיצוב וחיטוב · אימון זריחה","לימור נידם"],["08:30","פילאטיס power","מיכל רייכר"],["17:15","עיצוב וחיטוב · תחנות","מיכל רייכר"],["18:30","ספינינג","מיכל רייכר"],["19:30","יוגה","זוהרה"]],
    [["08:30","עיצוב וחיטוב","מיכל רייכר"],["09:30","פילאטיס power","מיכל רייכר"],["18:00","עיצוב וחיטוב","מיכל רייכר"],["19:15","עיצוב וחיטוב","מיכל רייכר"],["20:20","זומבה","שירז עזרא"]],
    [["08:30","פילאטיס power","מיכל רייכר"],["17:15","אימון כח משולב HIIT","מיכל רייכר"],["18:20","פילאטיס power","מיכל רייכר"],["19:30","ספינינג","מיכל רייכר"]],
    [["05:30","ריצת זריחה + מתיחות בטבע","מיכל רייכר"],["08:30","עיצוב וחיטוב","מיכל רייכר"],["17:30","עיצוב חיטוב · תחנות","ליאור מלול"],["18:45","קנגו ג׳אמפ","ליאור מלול"]],
    [["07:30","עיצוב וחיטוב","רחלי הילל"],["08:30","פילאטיס power","רחלי הילל"],["09:30","עיצוב וחיטוב","רחלי הילל"]],
    []
  ];
  var ANCHOR = Date.UTC(2026,5,21); // Sun 21 Jun 2026 = week A
  function weekOf(d){ var days=Math.floor((Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())-ANCHOR)/86400000); var wk=Math.floor(days/7); return (((wk%2)+2)%2)===0?A:B; }
  var DUR = 55*60000;
  var DAYS = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  var MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  function fmtDate(d){ return d.getDate()+" ב"+MONTHS[d.getMonth()]; }
  function sKey(start,time,cls){ return "s:"+start.getFullYear()+"-"+pad(start.getMonth()+1)+"-"+pad(start.getDate())+":"+time+":"+cls; }

  function dayObj(date,isToday){
    var arr=(weekOf(date)[date.getDay()]||[]); var now=Date.now();
    var list=arr.map(function(s){
      var hm=s[0].split(":"); var start=new Date(date.getFullYear(),date.getMonth(),date.getDate(),+hm[0],+hm[1]); var ms=start.getTime(); var st="up";
      if(isToday){ if(now>=ms+DUR)st="past"; else if(now>=ms)st="now"; }
      return {time:s[0],cls:s[1],who:s[2],ms:ms,key:sKey(start,s[0],s[1]),state:st};
    });
    if(isToday){ for(var i=0;i<list.length;i++){ if(list[i].state==="up"&&list[i].ms>now){ list[i].state="next"; break; } } }
    return {date:date,list:list};
  }

  /* coming counts for visible sessions */
  var comingMap = {};
  var weekOpen = false;
  function visibleDays(){
    var n=new Date(); var t=new Date(n.getFullYear(),n.getMonth(),n.getDate());
    var ds=[{d:t,today:true},{d:new Date(t.getFullYear(),t.getMonth(),t.getDate()+1),today:false}];
    if(weekOpen) for(var off=2;off<8;off++) ds.push({d:new Date(t.getFullYear(),t.getMonth(),t.getDate()+off),today:false});
    return ds;
  }
  var lastSessSig="";
  function fetchSessions(){
    var keys=[]; visibleDays().forEach(function(x){ dayObj(x.d,false).list.forEach(function(s){ keys.push(s.key); }); });
    if(!keys.length){ renderPanel(); return; }
    fetch(API+"/api/sessions?cid="+encodeURIComponent(cid)+"&keys="+encodeURIComponent(keys.join("|")))
      .then(function(r){return r.json();}).then(function(d){ if(d&&d.ok){ comingMap=d.sessions; } var sig=JSON.stringify(comingMap); if(sig!==lastSessSig){ lastSessSig=sig; renderPanel(); } }).catch(function(){});
  }

  function avatars(names){ return (names||[]).slice(0,5).map(function(n){ return '<span class="ava">'+esc(String(n||"?").trim().charAt(0)||"?")+'</span>'; }).join(""); }
  function comingLine(c,feature){
    if(!c||!c.count) return feature? '<div class="ses__coming muted">היי הראשונה שמסמנת ✨</div>':'';
    return '<div class="ses__coming">'+avatars(c.names)+' <b>'+c.count+'</b>&nbsp;מגיעות</div>';
  }
  function sesRow(s){
    var c=comingMap[s.key]||null, feat=(s.state==="now"||s.state==="next");
    var badge = s.state==="now"?'<span class="badge badge-now">🔴 עכשיו</span>':s.state==="next"?'<span class="badge badge-next">הבא בתור</span>':s.state==="past"?'<span class="badge badge-past">✓ הסתיים</span>':'';
    var sub='עם '+esc(s.who);
    if(s.state==="now"){ var left=Math.max(1,Math.round((s.ms+DUR-Date.now())/60000)); sub+=' · עוד כ-'+left+' דק׳'; }
    else if(s.state==="next"){ var diff=Math.round((s.ms-Date.now())/60000); if(diff<60) sub+=' · בעוד '+diff+' דק׳'; }
    var coming = s.state==="past" ? (c&&c.count?'<div class="ses__coming muted">'+c.count+' השתתפו</div>':'') : comingLine(c,feat);
    var rsvp = s.state==="past" ? '' : '<button class="ses__rsvp'+(c&&c.youComing?' is-on':'')+'" data-rsvp="'+esc(s.key)+'">'+(c&&c.youComing?'✓ מגיעה':'אני מגיעה')+'</button>';
    var wx="";
    if(s.state!=="past" && /ריצ|בטבע|חוץ/.test(s.cls)){ var w=wxByHour[wxKey(s.ms)]; if(w) wx='<span class="ses__wx">'+wxEmoji(w.code)+' '+Math.round(w.t)+'° · '+(w.p>=20?w.p+'% גשם':'בלי גשם')+' · צפת</span>'; }
    return '<div class="ses ses--'+s.state+'" data-key="'+esc(s.key)+'">'+
      '<div class="ses__time">'+esc(s.time)+'</div>'+
      '<div class="ses__main"><div class="ses__cls">'+esc(s.cls)+' '+badge+'</div><div class="ses__who">'+sub+'</div>'+wx+coming+'</div>'+
      rsvp+'</div>';
  }
  function isShabbat(d){ var day=d.getDay(), h=d.getHours(); return day===6 || (day===5 && h>=15); } // Fri eve → Sat
  function greeting(d){ var n=getName(); if(isShabbat(d)) return "שבת שלום 🌿"+(n?", "+esc(n):""); var h=d.getHours(); var g=h<12?"בוקר טוב ☀️":h<17?"צהריים טובים":h<21?"ערב טוב 🌙":"לילה טוב 🌙"; return g+(n?", "+esc(n):"")+" — הנה מה שקורה בסטודיו"; }

  /* ── weather (Open-Meteo, keyless) for outdoor runs · Safed/Tzfat ── */
  var wxByHour={};
  function wxKey(ms){ var d=new Date(ms); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"T"+pad(d.getHours())+":00"; }
  function wxEmoji(c){ if(c===0)return"☀️"; if(c<=3)return"⛅"; if(c<=48)return"🌫️"; if(c<=67)return"🌧️"; if(c<=77)return"🌨️"; if(c<=82)return"🌦️"; if(c<=86)return"🌨️"; return"⛈️"; }
  function loadWeather(){
    fetch("https://api.open-meteo.com/v1/forecast?latitude=32.9686&longitude=35.4889&hourly=temperature_2m,precipitation_probability,weather_code&forecast_days=8&timezone=auto")
      .then(function(r){return r.json();}).then(function(d){
        if(!d||!d.hourly)return; var t=d.hourly.time,tm=d.hourly.temperature_2m,pp=d.hourly.precipitation_probability,wc=d.hourly.weather_code,m={};
        for(var i=0;i<t.length;i++){ m[t[i]]={t:tm[i],p:pp[i]==null?0:pp[i],code:wc[i]}; }
        wxByHour=m; renderPanel();
      }).catch(function(){});
  }

  function renderPanel(){
    var now=new Date();
    var today=dayObj(new Date(now.getFullYear(),now.getMonth(),now.getDate()),true);
    var tmrwDate=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
    var tmrw=dayObj(tmrwDate,false);
    var done=today.list.filter(function(s){return s.state==="past";}).length;
    var h='<div class="greet">'+greeting(now)+'</div>';
    h+='<div class="day"><div class="day__h"><h2>היום</h2><span class="day__d">'+DAYS[now.getDay()]+' · '+fmtDate(now)+'</span></div>';
    if(today.list.length){ h+='<div class="day__prog">'+(done?done+' מתוך '+today.list.length+' אימונים הסתיימו':today.list.length+' אימונים מתוכננים היום')+'</div>'+today.list.map(sesRow).join(''); }
    else h+= (now.getDay()===6) ? '<div class="shabbat"><b>שבת שלום 🌿</b><span>הסטודיו סגור היום — נתראה אחרי צאת השבת.</span></div>' : '<div class="ses-empty">אין אימונים היום — יום מנוחה 🌿</div>';
    h+='</div>';
    h+='<div class="day"><div class="day__h"><h2>מחר</h2><span class="day__d">'+DAYS[tmrwDate.getDay()]+' · '+fmtDate(tmrwDate)+'</span></div>';
    h+= tmrw.list.length? tmrw.list.map(sesRow).join('') : '<div class="ses-empty">אין אימונים מחר 🌿</div>';
    h+='</div>';
    h+='<button class="weektoggle" id="weekToggle">'+(weekOpen?"הסתרת שאר השבוע ↑":"כל השבוע ↓")+'</button>';
    if(weekOpen){ for(var off=2;off<8;off++){ var d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+off); var dd=dayObj(d,false);
      h+='<div class="day"><div class="day__h"><h2>'+DAYS[d.getDay()]+'</h2><span class="day__d">'+fmtDate(d)+'</span></div>';
      h+= dd.list.length? dd.list.map(sesRow).join('') : '<div class="ses-empty">יום מנוחה 🌿</div>'; h+='</div>'; } }
    panelEl.innerHTML=h;
    var wt=$("#weekToggle"); if(wt) wt.addEventListener("click", function(){ weekOpen=!weekOpen; fetchSessions(); });
  }

  /* RSVP (delegated) */
  panelEl.addEventListener("click", function(e){
    var b=e.target.closest("[data-rsvp]"); if(!b) return;
    var key=b.getAttribute("data-rsvp");
    ensureName().then(function(name){
      post("/api/coming",{cid:cid,key:key,name:name}).then(function(r){
        if(r&&r.ok){ comingMap[key]={count:r.comingCount,names:r.coming.map(function(x){return x.name;}),youComing:r.youComing}; renderPanel(); toast(r.youComing?"מהמם! נתראה באימון 💪":"ביטלת את ההגעה"); }
      });
    }).catch(function(){});
  });

  /* ── feed (moments) ── */
  var openComments={};
  function renderFeed(d){
    var moments=d.moments||[];
    if(!moments.length){ feedEl.innerHTML=""; emptyEl.hidden=false; return; }
    emptyEl.hidden=true;
    feedEl.innerHTML=moments.map(function(m){
      var names=m.coming.map(function(x){return x.name;});
      var comingTxt=m.comingCount?("🙋‍♀️ "+m.comingCount+" מגיעות"+(names.length?" · "+names.slice(0,4).join(", "):"")):"";
      var cmtsHtml=m.comments.map(function(c){ return '<div class="cmt"><b>'+esc(c.name)+'</b> '+esc(c.text)+'<span class="cmt__t">'+ago(c.ts)+'</span></div>'; }).join("");
      return '<article class="moment" data-id="'+m.id+'">'+
        '<div class="moment__top"><img class="moment__av" src="assets/img/logo.png" alt=""><span class="moment__by">מיכל פיטנס</span><span class="moment__time">'+ago(m.ts)+'</span>'+(ADMIN?'<button class="moment__del" data-del="'+m.id+'">מחיקה</button>':'')+'</div>'+
        '<div class="moment__txt">'+(m.emoji?'<span class="em">'+esc(m.emoji)+'</span>':'')+esc(m.text)+'</div>'+
        (m.image?'<img class="moment__img" src="'+esc(m.image)+'" alt="" loading="lazy">':'')+
        '<div class="acts">'+
          '<button class="act'+(m.youLiked?" on-like":"")+'" data-like="'+m.id+'"><span class="ic">'+(m.youLiked?"❤️":"🤍")+'</span> <span class="n">'+m.likes+'</span></button>'+
          '<button class="act" data-cmt="'+m.id+'"><span class="ic">💬</span> <span class="n">'+m.comments.length+'</span></button>'+
          '<button class="act'+(m.youComing?" on-coming":"")+'" data-coming="'+m.id+'"><span class="ic">🙋‍♀️</span> '+(m.youComing?"מגיעה":"אני מגיעה")+'</button>'+
        '</div>'+
        (comingTxt?'<div class="coming-names">'+esc(comingTxt)+'</div>':'')+
        '<div class="cmts'+(openComments[m.id]?" open":"")+'" data-cmts="'+m.id+'"><div class="cmt-list">'+cmtsHtml+'</div>'+
          '<div class="cmt-form"><input type="text" maxlength="240" placeholder="כתבי תגובה…" data-cinput="'+m.id+'"><button class="act" data-csend="'+m.id+'">שליחה</button></div></div>'+
      '</article>';
    }).join("");
  }
  feedEl.addEventListener("click", function(e){
    var t=e.target.closest("[data-like],[data-cmt],[data-coming],[data-csend],[data-del]"); if(!t) return; var id;
    if((id=t.getAttribute("data-like"))){ post("/api/like",{cid:cid,id:id}).then(function(r){ if(r&&r.ok){ t.classList.toggle("on-like",r.youLiked); t.querySelector(".ic").textContent=r.youLiked?"❤️":"🤍"; t.querySelector(".n").textContent=r.likes; } }); }
    else if((id=t.getAttribute("data-coming"))){ ensureName().then(function(name){ post("/api/coming",{cid:cid,key:id,name:name}).then(function(r){ if(r&&r.ok){ refreshFeed(true); toast(r.youComing?"רשום! נתראה 💪":"בוטל"); } }); }).catch(function(){}); }
    else if((id=t.getAttribute("data-cmt"))){ var box=feedEl.querySelector('[data-cmts="'+id+'"]'); openComments[id]=!openComments[id]; box.classList.toggle("open",openComments[id]); if(openComments[id]){ var inp=box.querySelector("input"); if(inp) setTimeout(function(){inp.focus();},30); } }
    else if((id=t.getAttribute("data-csend"))){ sendComment(id); }
    else if((id=t.getAttribute("data-del"))){ if(confirm("למחוק את הפוסט?")) post("/api/delete",{adminKey:ADMIN,id:id}).then(function(r){ if(r&&r.ok){ delete openComments[id]; refreshFeed(true); toast("נמחק"); } }); }
  });
  feedEl.addEventListener("keydown", function(e){ if(e.key==="Enter"&&e.target.matches("[data-cinput]")) sendComment(e.target.getAttribute("data-cinput")); });
  function sendComment(id){ var inp=feedEl.querySelector('[data-cinput="'+id+'"]'); if(!inp) return; var text=inp.value.trim(); if(!text) return; ensureName().then(function(name){ post("/api/comment",{cid:cid,id:id,name:name,text:text}).then(function(r){ if(r&&r.ok){ inp.value=""; openComments[id]=true; refreshFeed(true); } }); }).catch(function(){}); }

  /* admin composer */
  var EMO=["🔥","🚴‍♀️","🥊","🧘‍♀️","💪","✨","❤️","🎉","⏰","📣"], chosen="";
  if(ADMIN){
    var comp=$("#composer"); comp.hidden=false; var ebox=$("#emojis");
    ebox.innerHTML=EMO.map(function(e){return '<button type="button" data-e="'+e+'">'+e+'</button>';}).join("");
    ebox.addEventListener("click", function(ev){ var b=ev.target.closest("[data-e]"); if(!b)return; var e=b.getAttribute("data-e"); chosen=(chosen===e?"":e); [].forEach.call(ebox.children,function(c){ c.classList.toggle("sel",c.getAttribute("data-e")===chosen); }); });
    $("#cPost").addEventListener("click", function(){ var txt=$("#cText").value.trim(); if(!txt&&!chosen){ toast("כתבי משהו 🙂"); return; } post("/api/moment",{adminKey:ADMIN,text:txt,emoji:chosen}).then(function(r){ if(r&&r.ok){ $("#cText").value=""; chosen=""; [].forEach.call(ebox.children,function(c){c.classList.remove("sel");}); refreshFeed(true); toast("פורסם! 🎉"); } else toast("הפרסום נכשל — בדקי את מפתח הניהול"); }); });
  }

  /* refresh loop */
  var loadingFeed=false, lastFeedSig="";
  function composing(){ return [].some.call(feedEl.querySelectorAll('[data-cinput]'),function(i){ return i.value.trim()!=="" || i===document.activeElement; }); }
  function refreshFeed(force){
    if(loadingFeed)return; loadingFeed=true;
    fetch(API+"/api/feed?cid="+encodeURIComponent(cid)).then(function(r){return r.json();}).then(function(d){
      if(d&&d.ok){
        var sig=JSON.stringify((d.moments||[]).map(function(m){ return [m.id,m.likes,m.comingCount,m.comments.length,m.youLiked,m.youComing]; }));
        if(force || (sig!==lastFeedSig && !composing())){ lastFeedSig=sig; renderFeed(d); }
      }
    }).catch(function(){}).then(function(){ loadingFeed=false; });
  }
  function refresh(){ fetchSessions(); refreshFeed(); }
  $("#refresh").addEventListener("click", function(){ refresh(); toast("רוענן"); });
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) refresh(); });

  renderPanel(); refresh(); loadWeather();
  setInterval(refresh, 9000);       // live polling (sessions + feed) — renders only on change
  setInterval(renderPanel, 30000);  // keep countdown / now-next / greeting fresh
  setInterval(loadWeather, 1800000);// refresh Safed forecast every 30 min

  /* install */
  var deferred=null, installBtn=$("#install");
  window.addEventListener("beforeinstallprompt", function(e){ e.preventDefault(); deferred=e; installBtn.hidden=false; });
  installBtn.addEventListener("click", function(){ if(deferred){ deferred.prompt(); deferred.userChoice.then(function(){ installBtn.hidden=true; deferred=null; }); } else toast("בספארי: שיתוף → ׳הוסף למסך הבית׳"); });
  window.addEventListener("appinstalled", function(){ installBtn.hidden=true; });
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent), standalone=window.matchMedia("(display-mode: standalone)").matches||navigator.standalone;
  if(isIOS && !standalone && !localStorage.getItem("mfnow_ios_hint")){ installBtn.hidden=false; installBtn.textContent="הוסיפי למסך הבית: שיתוף ⤴ → ׳למסך הבית׳"; localStorage.setItem("mfnow_ios_hint","1"); }

  if("serviceWorker" in navigator){ navigator.serviceWorker.register("now-sw.js",{scope:"./"}).catch(function(){}); }
})();
</script>
</body>
</html>
